<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hors ligne — Kadens</title>
  <meta name="theme-color" content="#b7532e">
  <!--
    Repli hors ligne, servi par le service worker (sw.js) quand une page non
    encore mise en cache est demandée sans réseau. Volontairement autonome :
    aucun asset externe (police, CSS, JS) pour rester affichable dans tous les
    cas. Couleurs reprises en dur des tokens « Carnet clair ».
  -->
  <style>
    :root {
      --bg: #e9e6df;
      --surface: #fffdf9;
      --border: #e3ddd1;
      --ink: #1a1712;
      --muted: #7a7264;
      --terra: #b7532e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 380px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 6px 28px rgba(0, 0, 0, .09);
      padding: 32px 28px;
      text-align: center;
    }
    .badge {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: 14px;
      background: var(--terra);
      color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
    }
    h1 { font-size: 19px; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: var(--muted); margin: 0 0 20px; }
    .eyebrow {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--terra);
      font-weight: 600;
      margin: 0 0 14px;
    }
    button {
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--surface);
      background: var(--terra);
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
    }
    button:hover { background: #8f3f22; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">K</div>
    <p class="eyebrow">Hors ligne</p>
    <h1>Cette page n'est pas disponible sans réseau</h1>
    <p>
      Les séances et plans déjà consultés restent accessibles hors ligne. Cette
      page-ci n'a pas encore été mise en cache.
    </p>
    <button type="button" onclick="location.reload()">Réessayer</button>
  </main>
</body>
</html>
